services:
  watchtower:
    image: containrrr/watchtower
    container_name: sat-watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Credenciales de Docker para acceder a GHCR (generadas por 'docker login ghcr.io')
      - $USERPROFILE/.docker/config.json:/config.json:ro
    environment:
      - WATCHTOWER_POLL_INTERVAL=60    # Revisa cada 60 segundos (para pruebas, luego subir a 300)
      - WATCHTOWER_CLEANUP=true        # Borra las imágenes viejas
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_LOG_LEVEL=debug     # Nivel de log detallado para diagnóstico
    command: sat-api sat-frontend
