services:
  watchtower:
    image: containrrr/watchtower
    container_name: sat-watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Credenciales de Docker (ruta absoluta para evitar fallos de expansión de variables)
      - C:\Users\J_Bra\.docker\config.json:/config.json:ro
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - DOCKER_API_VERSION=1.41
      - WATCHTOWER_LOG_LEVEL=info
    command: sat-api sat-frontend
