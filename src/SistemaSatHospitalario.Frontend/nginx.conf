# ═══════════════════════════════════════════════════════════
# Nginx Configuration — Sistema Sat Hospitalario Frontend
# Reverse Proxy + SPA Routing + WebSocket Support
# ═══════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    # --- Compresión Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # --- Angular SPA ---
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache agresivo para assets con hash (js, css, fonts, images)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }

    # --- API Backend Proxy ---
    location /api/ {
        proxy_pass http://api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts generosos para operaciones largas (reportes PDF, cierres de cuenta)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 30s;

        # Buffer para respuestas grandes
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # --- SignalR WebSocket Hub ---
    location /hub/ {
        proxy_pass http://api:8080/hub/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket keep-alive largo (24 horas)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- Health Check Proxy ---
    location /health {
        proxy_pass http://api:8080/health;
        access_log off;
    }

    # --- Error Pages ---
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
