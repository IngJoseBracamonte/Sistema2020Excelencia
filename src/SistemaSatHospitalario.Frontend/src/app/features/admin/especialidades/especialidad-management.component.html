<div class="space-y-8 animate-fade-in p-6 md:p-8 relative z-10">
    <!-- Header Section (V2.0 Midnight Blue Legítimo) -->
    <div class="flex flex-col md:flex-row md:items-center justify-between bg-surface-card backdrop-blur-3xl p-8 rounded-[3rem] border border-white/5 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-64 h-64 bg-rose-500/5 rounded-full -z-10 blur-3xl"></div>
        <div class="flex items-center space-x-6">
            <div class="h-16 w-16 bg-rose-500/10 text-rose-500 border border-rose-500/20 rounded-2xl flex items-center justify-center shadow-lg shadow-rose-500/5">
                <lucide-icon [name]="icons.Category" class="w-8 h-8"></lucide-icon>
            </div>
            <div>
                <h1 class="text-3xl font-black text-white tracking-tighter uppercase">Especialidades</h1>
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] mt-1 italic">Catálogo Maestro de Áreas Médicas</p>
            </div>
        </div>
        <button (click)="openCreate()" 
            class="mt-4 md:mt-0 bg-rose-500 hover:bg-rose-600 text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all shadow-xl shadow-rose-500/20 flex items-center group active:scale-95">
            <lucide-icon [name]="icons.Plus" class="w-4 h-4 mr-3 group-hover:rotate-90 transition-transform"></lucide-icon>
            NUEVA ESPECIALIDAD
        </button>
    </div>

    <!-- Loading State -->
    <div *ngIf="isLoading()" class="flex justify-center p-20">
        <div class="w-12 h-12 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
    </div>

    <!-- Content Grid (V2.0 Grid) -->
    <div *ngIf="!isLoading()" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <div *ngFor="let e of especialidades()" 
             class="bg-surface-card p-6 rounded-3xl border border-white/5 hover:border-primary/40 hover:bg-white/5 transition-all duration-300 group shadow-lg">
            
            <div class="flex justify-between items-start mb-6">
                <div class="w-12 h-12 bg-white/5 rounded-xl flex items-center justify-center border border-white/5 group-hover:bg-primary/10 transition-colors">
                    <lucide-icon [name]="icons.Category" class="w-6 h-6 text-slate-500 group-hover:text-primary transition-colors"></lucide-icon>
                </div>
                <div class="flex space-x-2 opacity-0 group-hover:opacity-100 transition-all transform translate-y-2 group-hover:translate-y-0">
                    <button (click)="openEdit(e)" class="p-2 bg-black/40 border border-white/5 rounded-lg text-slate-400 hover:text-white hover:bg-primary/20 transition-all">
                        <lucide-icon [name]="icons.Edit" class="w-4 h-4"></lucide-icon>
                    </button>
                    <button (click)="delete(e.id)" class="p-2 bg-black/40 border border-white/5 rounded-lg text-slate-400 hover:text-rose-500 hover:bg-rose-500/20 transition-all">
                        <lucide-icon [name]="icons.Delete" class="w-4 h-4"></lucide-icon>
                    </button>
                </div>
            </div>

            <h3 class="text-lg font-black text-white mb-4 tracking-tight uppercase group-hover:text-primary transition-colors">{{ e.nombre }}</h3>
            
            <div class="flex items-center justify-between pt-4 border-t border-white/5">
                <span [class]="e.activo ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-slate-800/40 text-slate-500 border-white/5'" 
                      class="text-[8px] font-black uppercase tracking-widest px-3 py-1 rounded-full border">
                    {{ e.activo ? '● ACTIVA' : '○ INACTIVA' }}
                </span>
            </div>
        </div>
    </div>

    <!-- Modal Form (V2.0 Redesign) -->
    <div *ngIf="showModal()" class="fixed inset-0 z-[150] flex items-center justify-center p-4">
        <div class="fixed inset-0 bg-slate-950/90 backdrop-blur-md animate-fade-in" (click)="showModal.set(false)"></div>
        <div class="relative bg-surface-card border border-white/5 w-full max-w-md rounded-[2.5rem] shadow-[0_0_50px_rgba(0,0,0,0.5)] overflow-hidden animate-scale-in">
            
            <div class="p-8 pb-4 flex items-center justify-between border-b border-white/5">
                <div class="flex items-center space-x-4">
                    <div class="h-12 w-12 rounded-2xl bg-primary/10 border border-primary/20 flex items-center justify-center text-primary shadow-lg shadow-primary/5">
                        <lucide-icon [name]="icons.Category" class="w-6 h-6"></lucide-icon>
                    </div>
                    <div>
                        <h3 class="text-xl font-black text-white tracking-tight uppercase">{{ isEditing() ? 'Editar Especialidad' : 'Nueva Especialidad' }}</h3>
                        <p class="text-[8px] font-black text-slate-400 uppercase tracking-[0.3em] mt-1 italic">Gestión de Catálogo Médico</p>
                    </div>
                </div>
                <button (click)="showModal.set(false)" class="p-2 text-slate-500 hover:text-white transition-colors">
                    <lucide-icon [name]="icons.Close" class="w-6 h-6"></lucide-icon>
                </button>
            </div>
            
            <div class="p-8 space-y-8">
                <div class="space-y-6">
                    <div class="space-y-2">
                        <label class="block text-[9px] font-black text-slate-500 uppercase tracking-widest px-1">Nombre del Área Médica</label>
                        <input [(ngModel)]="currentEsp().nombre" type="text" 
                            class="w-full bg-surface border border-white/5 rounded-2xl px-5 py-4 text-sm font-black text-white focus:border-primary focus:ring-4 focus:ring-primary/10 outline-none transition-all placeholder:text-slate-700 uppercase"
                            placeholder="EJ. ONCOLOGÍA MÉDICA">
                    </div>
                    <div class="flex items-center space-x-4 bg-black/40 p-5 rounded-2xl border border-white/5 transition-all hover:bg-black/60">
                        <input [(ngModel)]="currentEsp().activo" type="checkbox" id="chkEspActiva" class="w-6 h-6 accent-primary rounded-lg cursor-pointer">
                        <label for="chkEspActiva" class="text-[10px] font-black text-white uppercase tracking-widest cursor-pointer select-none">Especialidad de Atención Activa</label>
                    </div>
                </div>

                <div class="pt-4 flex flex-col space-y-3">
                    <button (click)="save()" 
                        class="w-full py-5 bg-rose-500 hover:bg-rose-600 text-white rounded-[1.5rem] font-black text-xs uppercase tracking-[0.2em] shadow-2xl shadow-rose-500/20 transition-all active:scale-95 flex items-center justify-center">
                        <lucide-icon [name]="isEditing() ? icons.Edit : icons.Plus" class="w-5 h-5 mr-3"></lucide-icon>
                        {{ isEditing() ? 'GUARDAR CAMBIOS' : 'REGISTRAR ÁREA MÉDICA' }}
                    </button>
                    <button (click)="showModal.set(false)" class="text-[9px] font-black text-slate-500 hover:text-white uppercase tracking-[0.3em] py-2 transition-colors">DESCARTAR</button>
                </div>
            </div>
        </div>
    </div>
</div>
