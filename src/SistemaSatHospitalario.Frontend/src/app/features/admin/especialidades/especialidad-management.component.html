<div class="space-y-8 animate-fade-in p-6 md:p-8 relative z-10">
    <!-- Header Section -->
    <div class="flex flex-col md:flex-row md:items-center justify-between bg-surface-card/60 backdrop-blur-2xl p-8 rounded-[2.5rem] border border-glass-border shadow-2xl">
        <div class="flex items-center space-x-6">
            <div class="h-16 w-16 bg-primary/10 rounded-2xl flex items-center justify-center text-primary border border-primary/20 shadow-lg shadow-primary/5">
                <lucide-icon [name]="icons.Category" class="w-8 h-8"></lucide-icon>
            </div>
            <div>
                <h1 class="text-3xl font-black text-main tracking-tighter uppercase">Especialidades</h1>
                <p class="text-[10px] font-black text-muted uppercase tracking-[0.2em] mt-1 italic">Catálogo Maestro de Áreas Médicas</p>
            </div>
        </div>
        <button (click)="openCreate()" 
            class="mt-4 md:mt-0 bg-primary hover:bg-primary-soft text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all shadow-xl shadow-primary/20 flex items-center group active:scale-95">
            <lucide-icon [name]="icons.Plus" class="w-4 h-4 mr-3 group-hover:rotate-90 transition-transform"></lucide-icon>
            NUEVA ESPECIALIDAD
        </button>
    </div>

    <!-- Loading State -->
    <div *ngIf="isLoading()" class="flex justify-center p-20">
        <div class="w-12 h-12 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
    </div>

    <!-- Content Grid -->
    <div *ngIf="!isLoading()" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <div *ngFor="let e of especialidades()" 
             class="bg-surface-card/40 backdrop-blur-xl p-6 rounded-3xl border border-glass-border hover:border-primary/20 transition-all duration-300 group">
            
            <div class="flex justify-between items-start mb-6">
                <div class="w-12 h-12 bg-primary/5 rounded-xl flex items-center justify-center border border-glass-border group-hover:bg-primary/10 transition-colors">
                    <lucide-icon [name]="icons.Category" class="w-6 h-6 text-primary/60 group-hover:text-primary transition-colors"></lucide-icon>
                </div>
                <div class="flex space-x-2 opacity-0 group-hover:opacity-100 transition-opacity">
                    <button (click)="openEdit(e)" class="p-2 bg-surface border border-glass-border rounded-lg text-muted hover:text-primary transition-all">
                        <lucide-icon [name]="icons.Edit" class="w-4 h-4"></lucide-icon>
                    </button>
                    <button (click)="delete(e.id)" class="p-2 bg-surface border border-glass-border rounded-lg text-muted hover:text-rose-400 transition-all">
                        <lucide-icon [name]="icons.Delete" class="w-4 h-4"></lucide-icon>
                    </button>
                </div>
            </div>

            <h3 class="text-lg font-black text-main mb-4 tracking-tight uppercase group-hover:text-primary transition-colors">{{ e.nombre }}</h3>
            
            <div class="flex items-center justify-between pt-4 border-t border-glass-border/40">
                <span [class]="e.activo ? 'text-emerald-400' : 'text-slate-500'" 
                      class="text-[8px] font-black uppercase tracking-widest">
                    {{ e.activo ? '● ACTIVA' : '○ INACTIVA' }}
                </span>
            </div>
        </div>
    </div>

    <!-- Modal Form -->
    <div *ngIf="showModal()" class="fixed inset-0 z-[150] overflow-y-auto py-8">
        <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm animate-fade-in" (click)="showModal.set(false)"></div>
        <div class="flex min-h-full items-center justify-center p-4">
            <div class="relative bg-surface-card border border-glass-border w-full max-w-md rounded-[2rem] shadow-2xl overflow-hidden animate-scale-in">
                <div class="bg-primary p-6 text-white flex justify-between items-center">
                    <div>
                        <h3 class="text-xl font-black uppercase tracking-tighter">{{ isEditing() ? 'Editar Especialidad' : 'Nueva Especialidad' }}</h3>
                    </div>
                    <button (click)="showModal.set(false)" class="text-white/50 hover:text-white transition-colors">
                        <lucide-icon [name]="icons.Close" class="w-5 h-5"></lucide-icon>
                    </button>
                </div>
                
                <div class="p-8 space-y-6">
                    <div class="space-y-4">
                        <div class="space-y-2">
                            <label class="block text-[10px] font-black text-muted uppercase tracking-[0.2em] px-1">Nombre de Especialidad</label>
                            <input [(ngModel)]="currentEsp().nombre" type="text" 
                                class="w-full bg-surface border border-glass-border rounded-xl px-4 py-4 text-xs font-black text-main focus:border-primary outline-none transition-all placeholder:text-muted/20 uppercase"
                                placeholder="EJ. CARDIOLOGÍA">
                        </div>
                        <div class="flex items-center space-x-3 bg-surface/50 p-4 rounded-xl border border-glass-border">
                            <input [(ngModel)]="currentEsp().activo" type="checkbox" id="chkEspActiva" class="w-5 h-5 accent-primary rounded-lg">
                            <label for="chkEspActiva" class="text-[10px] font-black text-main uppercase tracking-widest cursor-pointer">Área de Atención Activa</label>
                        </div>
                    </div>

                    <div class="pt-4 flex gap-4">
                        <button (click)="showModal.set(false)" class="flex-1 py-4 text-[10px] font-black text-muted uppercase tracking-[0.2em] hover:text-main transition-all">
                            CANCELAR
                        </button>
                        <button (click)="save()" 
                            class="flex-[2] py-4 bg-primary text-white rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all">
                            {{ isEditing() ? 'GUARDAR CAMBIOS' : 'REGISTRAR ÁREA' }}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
