<div class="space-y-8 animate-fade-in p-6 md:p-8 relative z-10">
    <!-- Header Section -->
    <div class="flex flex-col md:flex-row md:items-center justify-between bg-surface-card/60 backdrop-blur-2xl p-8 rounded-[2.5rem] border border-glass-border shadow-2xl">
        <div class="flex items-center space-x-6">
            <div class="h-16 w-16 bg-primary/10 rounded-2xl flex items-center justify-center text-primary border border-primary/20 shadow-lg shadow-primary/5">
                <lucide-icon [name]="icons.Doctor" class="w-8 h-8"></lucide-icon>
            </div>
            <div>
                <h1 class="text-3xl font-black text-main tracking-tighter uppercase">Nómina Médica</h1>
                <p class="text-[10px] font-black text-muted uppercase tracking-[0.2em] mt-1 italic">Gestión Integral de Especialistas</p>
            </div>
        </div>
        <button (click)="openCreate()" 
            class="mt-4 md:mt-0 bg-primary hover:bg-primary-soft text-white px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all shadow-xl shadow-primary/20 flex items-center group active:scale-95">
            <lucide-icon [name]="icons.Plus" class="w-4 h-4 mr-3 group-hover:rotate-90 transition-transform"></lucide-icon>
            REGISTRAR MÉDICO
        </button>
    </div>

    <!-- Loading State -->
    <div *ngIf="isLoading()" class="flex justify-center p-20">
        <div class="w-12 h-12 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
    </div>

    <!-- Medicos Grid -->
    <div *ngIf="!isLoading()" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <div *ngFor="let m of medicos()" 
             class="bg-surface-card/60 backdrop-blur-xl p-8 rounded-[2.5rem] border border-glass-border hover:border-primary/30 transition-all duration-500 group relative overflow-hidden flex flex-col justify-between h-full">
            
            <div class="absolute -right-8 -top-8 w-32 h-32 bg-primary/5 blur-3xl rounded-full group-hover:bg-primary/10 transition-colors"></div>

            <div>
                <div class="flex justify-between items-start mb-8 relative z-10">
                    <div class="w-16 h-16 bg-surface-light/50 rounded-2xl flex items-center justify-center border border-glass-border group-hover:border-primary/30 group-hover:bg-primary/10 group-hover:text-primary transition-all duration-500">
                        <lucide-icon [name]="icons.Doctor" class="w-8 h-8"></lucide-icon>
                    </div>
                    <div class="flex space-x-2">
                        <button (click)="openEdit(m)" class="p-3 bg-surface-light border border-glass-border rounded-xl text-muted hover:text-primary transition-all hover:scale-110">
                            <lucide-icon [name]="icons.Edit" class="w-4 h-4"></lucide-icon>
                        </button>
                        <button (click)="m.id && delete(m.id)" class="p-3 bg-surface-light border border-glass-border rounded-xl text-muted hover:text-rose-400 transition-all hover:scale-110">
                            <lucide-icon [name]="icons.Delete" class="w-4 h-4"></lucide-icon>
                        </button>
                    </div>
                </div>

                <h3 class="text-2xl font-black text-main mb-1 tracking-tighter uppercase group-hover:text-primary transition-colors">{{ m.nombre }}</h3>
                <p class="text-[10px] font-black text-muted uppercase tracking-[0.2em] mb-6 italic">{{ m.especialidad }}</p>
            </div>

            <div class="flex items-center justify-between pt-6 border-t border-glass-border">
                <span [class]="m.activo ? 'text-emerald-400 bg-emerald-400/10' : 'text-slate-400 bg-slate-400/10'" 
                      class="px-4 py-1 rounded-full text-[9px] font-black uppercase tracking-[0.2em] border border-glass-border">
                    {{ m.activo ? 'ACTIVO' : 'INACTIVO' }}
                </span>
                <span class="text-[9px] font-black text-muted/30 uppercase tracking-widest">UID: {{ m.id?.substring(0,8) }}</span>
            </div>
        </div>
    </div>

    <!-- Modal Form (Estructura de Centrado Profesional) -->
    <div *ngIf="showModal()" class="fixed inset-0 z-[150] overflow-y-auto py-8">
        <!-- Backdrop -->
        <div class="fixed inset-0 bg-slate-900/95 backdrop-blur-md animate-fade-in" (click)="showModal.set(false)"></div>
        
        <!-- Modal Container (Flex para Centrado Dinámico) -->
        <div class="flex min-h-full items-center justify-center p-4 pointer-events-none">
            <div class="relative bg-surface-card border border-glass-border w-full max-w-lg rounded-[2rem] shadow-2xl overflow-hidden animate-scale-in pointer-events-auto my-auto">
                <div class="bg-primary p-6 text-white flex justify-between items-center relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-bl-[100px] -mr-8 -mt-8"></div>
                    <div class="relative z-10">
                        <h3 class="text-xl font-black uppercase tracking-tighter">{{ isEditing() ? 'Editar Especialista' : 'Nuevo Registro' }}</h3>
                        <p class="text-[8px] font-black uppercase tracking-widest opacity-60">Complete la información técnica</p>
                    </div>
                    <button (click)="showModal.set(false)" class="relative z-10 text-white/50 hover:text-white transition-colors">
                        <lucide-icon [name]="icons.Close" class="w-5 h-5"></lucide-icon>
                    </button>
                </div>
                
                <div class="p-6 space-y-6 bg-surface-card/60 backdrop-blur-2xl">
                    <div class="space-y-4">
                        <div class="space-y-1.5">
                            <label class="block text-[9px] font-black text-muted uppercase tracking-widest px-1">Nombre Completo</label>
                            <input [(ngModel)]="currentMedico().nombre" type="text" 
                                class="w-full bg-surface border border-glass-border rounded-xl px-4 py-3.5 text-xs font-black text-main focus:border-primary outline-none transition-all placeholder:text-muted/20 uppercase"
                                placeholder="Dr. Ej. Juan Pérez">
                        </div>
                        <div class="space-y-1.5">
                            <label class="block text-[9px] font-black text-muted uppercase tracking-widest px-1">Especialidad Materia</label>
                            <select [(ngModel)]="currentMedico().especialidad" 
                                class="w-full bg-surface border border-glass-border rounded-xl px-4 py-3.5 text-xs font-black text-main focus:border-primary outline-none transition-all uppercase appearance-none cursor-pointer">
                                <option value="" disabled selected>Seleccione una especialidad...</option>
                                <option *ngFor="let esp of especialidadesCatalogo()" [value]="esp.nombre">{{ esp.nombre }}</option>
                            </select>
                        </div>
                        <div class="flex items-center space-x-3 bg-surface/50 p-4 rounded-xl border border-glass-border">
                            <input [(ngModel)]="currentMedico().activo" type="checkbox" id="chkActPremium" class="w-5 h-5 accent-primary rounded-lg">
                            <label for="chkActPremium" class="text-[9px] font-black text-main uppercase tracking-widest cursor-pointer">Especialista Habilitado</label>
                        </div>
                    </div>

                    <div class="pt-2 flex gap-4">
                        <button (click)="showModal.set(false)" class="flex-1 py-3.5 text-[9px] font-black text-muted uppercase tracking-widest hover:text-main transition-all">
                            CANCELAR
                        </button>
                        <button (click)="save()" 
                            class="flex-[2] py-3.5 bg-primary text-white rounded-xl font-black text-[9px] uppercase tracking-[0.2em] shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all">
                            {{ isEditing() ? 'GUARDAR' : 'REGISTRAR' }}
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
