<div class="p-6 space-y-8 animate-fade-in">
    <!-- Header Section -->
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
            <h1 class="text-3xl font-bold text-white flex items-center">
                <lucide-icon [name]="icons.ShieldCheck" class="w-8 h-8 mr-3 text-rose-500"></lucide-icon>
                Solicitudes de Reset de Password
            </h1>
            <p class="text-slate-400 mt-1">Gestiona los permisos para que los usuarios actualicen sus credenciales.</p>
        </div>
        <button (click)="loadRequests()" class="flex items-center space-x-2 bg-slate-900 border border-slate-800 hover:border-slate-700 text-white px-4 py-2 rounded-xl transition-all">
            <lucide-icon [name]="icons.RefreshCw" class="w-4 h-4" [class.animate-spin]="loading()"></lucide-icon>
            <span>Actualizar</span>
        </button>
    </div>

    <!-- Requests Table -->
    <div class="bg-slate-900/50 backdrop-blur-xl border border-white/5 rounded-3xl overflow-hidden shadow-2xl">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b border-white/5 bg-white/5 uppercase text-[10px] font-bold tracking-widest text-slate-400">
                        <th class="px-6 py-4">Usuario</th>
                        <th class="px-6 py-4">Fecha Solicitud</th>
                        <th class="px-6 py-4">Estado</th>
                        <th class="px-6 py-4 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-white/5">
                    <tr *ngFor="let req of requests()" class="hover:bg-white/[0.02] transition-colors group">
                        <td class="px-6 py-5">
                            <div class="flex items-center">
                                <div class="w-10 h-10 rounded-xl bg-rose-500/10 flex items-center justify-center text-rose-500 font-bold mr-3">
                                    {{ req.username.charAt(0).toUpperCase() }}
                                </div>
                                <span class="text-white font-medium">{{ req.username }}</span>
                            </div>
                        </td>
                        <td class="px-6 py-5 text-slate-300">
                            {{ req.fechaSolicitud | date:'short' }}
                        </td>
                        <td class="px-6 py-5">
                            <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold bg-amber-500/10 text-amber-500 border border-amber-500/20">
                                <lucide-icon [name]="icons.Clock" class="w-3 h-3 mr-1.5"></lucide-icon>
                                {{ req.estado }}
                            </span>
                        </td>
                        <td class="px-6 py-5 text-right">
                            <button (click)="approve(req.id)" class="bg-rose-600 hover:bg-rose-500 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg shadow-rose-900/20 transition-all active:scale-95 flex items-center space-x-2 ml-auto">
                                <lucide-icon [name]="icons.CheckCircle" class="w-4 h-4"></lucide-icon>
                                <span>Aprobar Reset</span>
                            </button>
                        </td>
                    </tr>

                    <!-- Empty State -->
                    <tr *ngIf="requests().length === 0 && !loading()">
                        <td colspan="4" class="px-6 py-20 text-center">
                            <div class="flex flex-col items-center">
                                <lucide-icon [name]="icons.Search" class="w-12 h-12 text-slate-700 mb-4"></lucide-icon>
                                <p class="text-slate-500 font-medium text-lg">No hay solicitudes pendientes.</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
