<div class="flex items-center justify-between w-full max-w-xl mx-auto mb-6 px-4">
  <ng-container *ngFor="let label of stepLabels; let i = index">
    <!-- Step Node -->
    <div class="flex flex-col items-center relative z-10">
      <div 
        class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-xs transition-all duration-300"
        [ngClass]="{
          'bg-emerald-500 text-slate-900 border-2 border-emerald-400 shadow-[0_0_10px_rgba(16,185,129,0.5)]': currentStep > i + 1,
          'bg-indigo-500 text-white border-2 border-indigo-400 shadow-[0_0_10px_rgba(99,102,241,0.5)] scale-110': currentStep === i + 1,
          'bg-slate-800 text-slate-400 border border-slate-700': currentStep < i + 1
        }"
      >
        <span *ngIf="currentStep > i + 1">✓</span>
        <span *ngIf="currentStep <= i + 1">{{ i + 1 }}</span>
      </div>
      <span 
        class="mt-2 text-[10px] uppercase font-black tracking-widest text-slate-400 text-center transition-all duration-300"
        [ngClass]="{
          'text-emerald-400': currentStep > i + 1,
          'text-indigo-400 font-extrabold': currentStep === i + 1
        }"
      >
        {{ label }}
      </span>
    </div>

    <!-- Connector Line -->
    <div 
      *ngIf="i < stepLabels.length - 1"
      class="flex-1 h-0.5 mx-2 bg-slate-800 rounded relative -top-3"
    >
      <div 
        class="h-full bg-indigo-500 transition-all duration-500"
        [style.width.%]="currentStep > i + 1 ? 100 : 0"
      ></div>
    </div>
  </ng-container>
</div>
