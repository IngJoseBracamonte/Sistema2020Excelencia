<div class="min-h-screen bg-slate-950 flex items-center justify-center p-6 relative overflow-hidden">
    <!-- Animated Background Gradients -->
    <div class="absolute top-0 -left-1/4 w-1/2 h-1/2 bg-rose-600/10 blur-[120px] rounded-full animate-pulse"></div>
    <div class="absolute bottom-0 -right-1/4 w-1/2 h-1/2 bg-blue-600/10 blur-[120px] rounded-full animate-pulse delay-700"></div>

    <div class="max-w-md w-full relative z-10">
        <!-- Brand Header -->
        <div class="text-center mb-8 animate-fade-in-up">
            <div class="inline-flex p-3 rounded-2xl bg-slate-900 border border-slate-800 shadow-xl mb-4">
                <lucide-icon [name]="icons.ShieldCheck" class="w-10 h-10 text-rose-500"></lucide-icon>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">Actualizar Contraseña</h1>
            <p class="text-slate-400 mt-2">Por seguridad, debes establecer una nueva clave para continuar.</p>
        </div>

        <!-- Success Message -->
        <div *ngIf="success()" class="bg-emerald-500/10 border border-emerald-500/20 p-6 rounded-2xl text-center animate-scale-in">
            <div class="w-12 h-12 bg-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <lucide-icon [name]="icons.Save" class="text-white w-6 h-6"></lucide-icon>
            </div>
            <h3 class="text-emerald-400 font-bold text-lg">¡Contraseña Actualizada!</h3>
            <p class="text-emerald-400/70 text-sm mt-1">Redirigiendo al sistema...</p>
        </div>

        <!-- Form -->
        <form *ngIf="!success()" (ngSubmit)="onSubmit()" class="bg-slate-900/50 backdrop-blur-xl border border-white/5 rounded-3xl p-8 shadow-2xl space-y-6 animate-fade-in-up delay-200">
            
            <div *ngIf="error()" class="bg-rose-500/10 border border-rose-500/20 p-4 rounded-xl flex items-start space-x-3 text-rose-400 animate-shake">
                <lucide-icon [name]="icons.AlertCircle" class="w-5 h-5 flex-shrink-0 mt-0.5"></lucide-icon>
                <p class="text-sm font-medium">{{ error() }}</p>
            </div>

            <!-- New Password -->
            <div class="space-y-2">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Nueva Contraseña</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-rose-500 transition-colors">
                        <lucide-icon [name]="icons.Lock" class="w-5 h-5"></lucide-icon>
                    </div>
                    <input 
                        type="password" 
                        [(ngModel)]="newPassword" 
                        name="newPassword"
                        required
                        class="block w-full pl-12 pr-4 py-4 bg-slate-950 border border-slate-800 rounded-2xl text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-rose-500/50 focus:border-rose-500 transition-all"
                        placeholder="••••••••"
                    >
                </div>
            </div>

            <!-- Confirm Password -->
            <div class="space-y-2">
                <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider ml-1">Confirmar Contraseña</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-rose-500 transition-colors">
                        <lucide-icon [name]="icons.Lock" class="w-5 h-5"></lucide-icon>
                    </div>
                    <input 
                        type="password" 
                        [(ngModel)]="confirmPassword" 
                        name="confirmPassword"
                        required
                        class="block w-full pl-12 pr-4 py-4 bg-slate-950 border border-slate-800 rounded-2xl text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-rose-500/50 focus:border-rose-500 transition-all"
                        placeholder="••••••••"
                    >
                </div>
            </div>

            <!-- Submit Button -->
            <button 
                type="submit" 
                [disabled]="loading()"
                class="w-full bg-gradient-to-r from-rose-600 to-rose-500 hover:from-rose-500 hover:to-rose-400 disabled:opacity-50 disabled:cursor-not-allowed py-4 px-6 rounded-2xl text-white font-bold text-lg shadow-lg shadow-rose-900/20 transition-all active:scale-[0.98] flex items-center justify-center space-x-2"
            >
                <span *ngIf="!loading()">Guardar y Continuar</span>
                <div *ngIf="loading()" class="w-6 h-6 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
            </button>
        </form>
    </div>
</div>
