<div class="min-h-screen bg-slate-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 relative overflow-hidden">

  <!-- Estética Premium: Elementos ornamentales de fondo (Glassmorphism effect elements) -->
  <div
    class="absolute -top-[10rem] -left-[10rem] w-[40rem] h-[40rem] rounded-full bg-hospital-200/40 blur-3xl mix-blend-multiply opacity-70 animate-pulse">
  </div>
  <div
    class="absolute top-[10rem] -right-[10rem] w-[40rem] h-[40rem] rounded-full bg-hospital-300/30 blur-3xl mix-blend-multiply opacity-70">
  </div>

  <div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10 animate-fade-in">
    <div class="flex justify-center">
      <!-- Logo Premium -->
      <div
        class="h-24 w-auto flex items-center justify-center transform transition-transform hover:scale-105 duration-300">
        <img src="assets/logo_premium.png" alt="SAT Logo" class="h-20 w-auto drop-shadow-2xl">
      </div>
    </div>
    <h2 class="mt-6 text-center text-3xl font-extrabold tracking-tight text-slate-900">
      Satélite Hospitalario
    </h2>
    <p class="mt-2 text-center text-sm text-slate-600">
      Accede con tus credenciales seguras
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md relative z-10 animate-fade-in" style="animation-delay: 0.1s;">
    <div
      class="bg-white/80 backdrop-blur-xl py-8 px-4 shadow-2xl sm:rounded-3xl sm:px-10 border border-slate-100/50 relative overflow-hidden">

      <!-- Efecto brillo top panel -->
      <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-hospital-400 via-hospital-500 to-hospital-300">
      </div>

      <form class="space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <div *ngIf="errorMessage()"
          class="rounded-xl bg-emergency-light/20 p-4 border border-emergency-light/50 flex animate-fade-in">
          <div class="flex-shrink-0">
            <svg class="h-5 w-5 text-emergency-dark" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd"
                d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                clip-rule="evenodd" />
            </svg>
          </div>
          <div class="ml-3">
            <h3 class="text-sm font-medium text-emergency-dark">{{ errorMessage() }}</h3>
          </div>
        </div>

        <div>
          <label for="username" class="block text-sm font-medium text-slate-700"> Usuario </label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z">
                </path>
              </svg>
            </div>
            <input id="username" formControlName="username" type="text" autocomplete="username" required
              class="appearance-none block w-full pl-10 px-3 py-3 border border-slate-300 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-hospital-500 focus:border-hospital-500 sm:text-sm transition-all duration-200 bg-white/50"
              placeholder="admin">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-700"> Contraseña </label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="h-5 w-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                </path>
              </svg>
            </div>
            <input id="password" formControlName="password" type="password" autocomplete="current-password" required
              class="appearance-none block w-full pl-10 px-3 py-3 border border-slate-300 rounded-xl shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-hospital-500 focus:border-hospital-500 sm:text-sm transition-all duration-200 bg-white/50"
              placeholder="••••••••">
          </div>
        </div>

        <div class="flex items-center justify-between">
          <div class="text-sm">
            <a href="#" class="font-medium text-hospital-600 hover:text-hospital-500 transition-colors"> ¿Olvidó su
              contraseña? </a>
          </div>
        </div>

        <div>
          <button type="submit" [disabled]="loginForm.invalid || isLoading()"
            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-md text-sm font-bold text-white bg-gradient-to-r from-hospital-600 to-hospital-500 hover:from-hospital-500 hover:to-hospital-400 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-hospital-500 transition-all transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
            <span *ngIf="!isLoading()">Ingresar al Sistema</span>
            <span *ngIf="isLoading()" class="flex items-center">
              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                </path>
              </svg>
              Autenticando...
            </span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
