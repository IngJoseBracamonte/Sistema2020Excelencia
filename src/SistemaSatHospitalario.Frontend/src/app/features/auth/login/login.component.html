<div class="min-h-screen bg-surface flex flex-col justify-center py-12 sm:px-6 lg:px-8 relative overflow-hidden text-main">

  <!-- Estética Premium: Elementos ornamentales de fondo (Rose Glow Effects) -->
  <div
    class="absolute -top-[10rem] -left-[10rem] w-[40rem] h-[40rem] rounded-full bg-primary/10 blur-[120px] mix-blend-screen opacity-50 animate-pulse">
  </div>
  <div
    class="absolute bottom-[-10rem] -right-[10rem] w-[40rem] h-[40rem] rounded-full bg-primary/5 blur-[120px] mix-blend-screen opacity-30">
  </div>

  <div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10 animate-in fade-in slide-in-from-bottom-8 duration-700">
    <div class="flex justify-center">
      <!-- Logo Premium with Glow -->
      <div
        class="h-24 w-auto flex items-center justify-center transform transition-transform hover:scale-105 duration-500 relative">
        <div class="absolute inset-0 bg-primary/20 blur-2xl rounded-full"></div>
        <img src="assets/logo_premium.png" alt="SAT Logo" class="h-20 w-auto drop-shadow-[0_0_20px_rgba(255,255,255,0.1)] relative z-10">
      </div>
    </div>
    <h2 class="mt-8 text-center text-4xl font-black tracking-tighter uppercase text-main">
      Satélite <span class="text-primary-glow">Hospitalario</span>
    </h2>
    <p class="mt-2 text-center text-xs font-bold uppercase tracking-[0.2em] text-muted opacity-60">
      SISTEMA DE GESTIÓN DE EXCELENCIA
    </p>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-md relative z-10 animate-in fade-in zoom-in-95 duration-1000 delay-100">
    <div
      class="glass-panel py-10 px-6 shadow-2xl sm:rounded-[2.5rem] sm:px-12 border border-glass-border relative overflow-hidden bg-surface-card/40 backdrop-blur-2xl">

      <!-- Efecto brillo superior (Rose Accent) -->
      <div class="absolute top-0 inset-x-0 h-[2px] bg-gradient-to-r from-transparent via-primary to-transparent opacity-50">
      </div>

      <form class="space-y-8" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <div *ngIf="errorMessage()"
          class="rounded-2xl bg-rose-500/10 p-4 border border-rose-500/30 flex animate-in fade-in slide-in-from-top-4">
          <div class="flex-shrink-0">
            <lucide-icon [name]="icons.AlertCircle" class="h-5 w-5 text-rose-500"></lucide-icon>
          </div>
          <div class="ml-3">
            <h3 class="text-xs font-black uppercase tracking-tight text-rose-500">{{ errorMessage() }}</h3>
          </div>
        </div>

        <div class="space-y-2">
          <label for="username" class="block text-[10px] font-black uppercase tracking-widest text-muted ml-1"> Usuario </label>
          <div class="mt-1 relative group">
            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none transition-colors group-focus-within:text-primary">
              <lucide-icon [name]="icons.User" class="h-5 w-5 text-muted/60 transition-colors"></lucide-icon>
            </div>
            <input id="username" formControlName="username" type="text" autocomplete="username" required
              class="appearance-none block w-full pl-14 pr-5 py-4 bg-surface border border-glass-border rounded-2xl shadow-sm placeholder:text-muted/20 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary text-sm transition-all duration-300 font-medium"
              placeholder="admin">
          </div>
        </div>

        <div class="space-y-2">
          <label for="password" class="block text-[10px] font-black uppercase tracking-widest text-muted ml-1"> Contraseña </label>
          <div class="mt-1 relative group">
            <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none transition-colors group-focus-within:text-primary">
              <lucide-icon [name]="icons.Lock" class="h-5 w-5 text-muted/60 transition-colors"></lucide-icon>
            </div>
            <input id="password" formControlName="password" [type]="showPassword() ? 'text' : 'password'" autocomplete="current-password" required
              class="appearance-none block w-full pl-14 pr-12 py-4 bg-surface border border-glass-border rounded-2xl shadow-sm placeholder:text-muted/20 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary text-sm transition-all duration-300 font-medium"
              placeholder="••••••••">
            <button type="button" (click)="togglePasswordVisibility()" class="absolute inset-y-0 right-0 pr-5 flex items-center text-muted/40 hover:text-primary transition-colors focus:outline-none focus:text-primary">
              <lucide-icon [name]="showPassword() ? icons.EyeOff : icons.Eye" class="h-5 w-5"></lucide-icon>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-end">
          <div class="text-[10px] font-black uppercase tracking-widest">
            <a href="#" class="text-muted hover:text-primary transition-colors"> ¿Olvidó su contraseña? </a>
          </div>
        </div>

        <div class="pt-2">
          <button type="submit" [disabled]="loginForm.invalid || isLoading()"
            class="group w-full flex justify-center py-4 px-4 rounded-2xl shadow-xl shadow-primary/20 text-xs font-black uppercase tracking-widest text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary focus:ring-offset-surface transition-all transform hover:scale-[1.02] active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none relative overflow-hidden">
            <span *ngIf="!isLoading()" class="relative z-10">Ingresar al Sistema</span>
            <span *ngIf="isLoading()" class="flex items-center relative z-10">
              <lucide-icon [name]="icons.RefreshCcw" class="animate-spin h-4 w-4 mr-3"></lucide-icon>
              Autenticando...
            </span>
            <!-- Subtle Reflection Effect -->
            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:animate-shimmer"></div>
          </button>
        </div>
      </form>
      
      <div class="mt-8 text-center pt-8 border-t border-glass-border/50">
        <p class="text-[9px] font-black uppercase tracking-widest text-muted/30">
          Powered by DeepMind Advanced Agency • 2026
        </p>
      </div>
    </div>
  </div>
</div>
