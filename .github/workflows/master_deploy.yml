name: master_deploy_orchestration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_backend:
    name: Build & Test .NET API
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    - name: Restore dependencies
      run: dotnet restore src/SistemaSatHospitalario.WebAPI/SistemaSatHospitalario.WebAPI.csproj
    - name: Build
      run: dotnet build src/SistemaSatHospitalario.WebAPI/SistemaSatHospitalario.WebAPI.csproj --no-restore -c Release
    - name: Trigger Render Deploy
      if: github.event_name == 'push'
      run: |
        curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
